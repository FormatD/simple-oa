# Production Docker Compose configuration
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_NAME:-enterprise_mgmt}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-rls.sql:/docker-entrypoint-initdb.d/init-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # R3: Redis cache (RDB persistence)
  redis-cache:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 900 1 --save 300 10 --appendonly no --requirepass ${REDIS_CACHE_PASSWORD:-}
    ports:
      - "${REDIS_CACHE_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_CACHE_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # R3: Redis queue/Pub/Sub (AOF persistence)
  redis-queue:
    image: redis:7-alpine
    restart: always
    command: redis-server --save "" --appendonly yes --appendfsync everysec --requirepass ${REDIS_QUEUE_PASSWORD:-}
    ports:
      - "${REDIS_QUEUE_PORT:-6380}:6380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "-a", "${REDIS_QUEUE_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # M7: backend is NOT exposed to host — accessed only via frontend nginx reverse proxy
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8000"
    environment:
      APP_NAME: ${APP_NAME:-Enterprise Management}
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-change-me-in-production}@postgres:5432/${DB_NAME:-enterprise_mgmt}
      DATABASE_SYNC_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-change-me-in-production}@postgres:5432/${DB_NAME:-enterprise_mgmt}
      REDIS_URL: redis://:${REDIS_CACHE_PASSWORD:-}@redis-cache:6379/0
      REDIS_QUEUE_URL: redis://:${REDIS_QUEUE_PASSWORD:-}@redis-queue:6380/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      ENABLE_RLS: "true"
      OTEL_EXPORTER_ENDPOINT: ${OTEL_EXPORTER_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
